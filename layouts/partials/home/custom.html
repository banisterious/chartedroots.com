{{ $hero := resources.Get "img/hero.svg" }}
<article class="max-w-full prose dark:prose-invert">
  <section class="cr-hero">
    {{ with $hero }}
      <img class="cr-hero__seal nozoom" src="{{ .RelPermalink }}" alt="Charted Roots seal" width="360" height="360">
    {{ end }}
    <h1 class="cr-hero__title">{{ .Site.Title }}</h1>
    {{ with .Site.Params.description }}
      <p class="cr-hero__tagline">{{ . | markdownify }}</p>
    {{ end }}
    <div class="cr-hero__actions">
      <a class="!rounded-md bg-primary-600 px-4 py-2 !text-neutral !no-underline hover:!bg-primary-500"
         href="https://github.com/banisterious/obsidian-charted-roots"
         target="_blank"
         rel="noopener noreferrer"
         role="button">View on GitHub</a>
      <a class="!rounded-md bg-primary-600 px-4 py-2 !text-neutral !no-underline hover:!bg-primary-500"
         href="https://github.com/banisterious/obsidian-charted-roots/wiki"
         target="_blank"
         rel="noopener noreferrer"
         role="button">Get Started</a>
    </div>
  </section>
  <section class="prose max-w-full">
    {{ .Content }}
  </section>
</article>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Charted Roots</title>
  <desc>The Charted Roots seal in oxblood on a transparent background. For use on cream, beige, or light-warm surfaces.</desc>
  <style>

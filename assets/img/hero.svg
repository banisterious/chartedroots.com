    }
    @font-face {
      font-family: 'Literata';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@fontsource/literata@5/files/literata-latin-500-normal.woff2') format('woff2');
    }
  </style>
  <defs>

baseURL = 'https://chartedroots.com/'
languageCode = 'en-us'
title = 'Charted Roots'
theme = 'blowfish'

# Enable emoji rendering
enableEmoji = true

# Build settings
[build]
  noJSConfigInAssets = true

[params]
  # Site description — shown as the hero tagline and meta description
  description = "Obsidian plugin for genealogy and worldbuilding: family tree visualization, evidence tracking, fictional universes, and reports."

  # Site appearance
  colorScheme = "charted-roots"
  defaultAppearance = "light"
  autoSwitchAppearance = false

  # Homepage
  homepage.layout = "custom"
  homepage.showRecent = false

  # Social / OG
  defaultSocialImage = "img/social-card.png"

  # Article settings
  article.showAuthor = false
  article.showDate = true
  article.showReadingTime = true
  article.showTableOfContents = true
  article.showPagination = true
  article.showBreadcrumbs = true

  # List settings
  list.showBreadcrumbs = true
  list.showTableOfContents = true

  # Global settings
  enableSearch = true
  enableCodeCopy = true

  # Logo and branding
  logo = "img/logo.svg"

  # Footer
  footer.showCopyright = true
  footer.showThemeAttribution = false
  footer.showAppearanceSwitcher = false
  footer.showScrollToTop = true

[params.author]
  name = "banisterious"

# Main menu
[menu]
  [[menu.main]]
    name = "Features"
    pageRef = "features"
    weight = 10
  [[menu.main]]
    name = "Research"
    pageRef = "research"
    weight = 15
  [[menu.main]]
    name = "Worldbuilding"
    pageRef = "worldbuilding"
    weight = 20
  [[menu.main]]
    name = "Documentation"
    url = "https://github.com/banisterious/obsidian-charted-roots/wiki"
    weight = 25
  [[menu.main]]
    name = "Changelog"
    pageRef = "changelog"
    weight = 30
  [[menu.main]]
    name = "FAQ"
    pageRef = "faq"
    weight = 35
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/banisterious/obsidian-charted-roots"
    weight = 40
    [menu.main.params]
      icon = "github"

# Markup settings
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

# Output formats for search
[outputs]
  home = ["HTML", "RSS", "JSON"]
